name: Patch Mikrotik RouterOS 7.x
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      arch:
        description: 'Architecture (x86, arm64, arm)'
        required: true
        default: 'x86'
        type: choice
        options:
          - x86
          - arm64
          - arm
      channel:
        description: 'Channel (stable, testing)'
        required: true
        default: 'stable'
        type: choice
        options:
          - stable
          - long-term
          - testing
      version:
        description: "Specify version (e.g., 7.19.2), empty for latest"
        required: false
        default: ''
        type: string
      buildtime:
        description: "Custom build time, leave empty for now"
        required: false
        default: ''
        type: string
      release:
        description: "Release to GitHub & Upload "
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  CUSTOM_LICENSE_PRIVATE_KEY: ${{ secrets.CUSTOM_LICENSE_PRIVATE_KEY }}
  CUSTOM_LICENSE_PUBLIC_KEY: ${{ secrets.CUSTOM_LICENSE_PUBLIC_KEY }}
  CUSTOM_NPK_SIGN_PRIVATE_KEY: ${{ secrets.CUSTOM_NPK_SIGN_PRIVATE_KEY }}
  CUSTOM_NPK_SIGN_PUBLIC_KEY: ${{ secrets.CUSTOM_NPK_SIGN_PUBLIC_KEY }}
  CUSTOM_CLOUD_PUBLIC_KEY: ${{ secrets.CUSTOM_CLOUD_PUBLIC_KEY }}
  MIKRO_LICENSE_PUBLIC_KEY: ${{ secrets.MIKRO_LICENSE_PUBLIC_KEY }}
  MIKRO_NPK_SIGN_PUBLIC_KEY: ${{ secrets.MIKRO_NPK_SIGN_PUBLIC_KEY }}
  MIKRO_CLOUD_PUBLIC_KEY: ${{ secrets.MIKRO_CLOUD_PUBLIC_KEY }}
  MIKRO_LICENCE_URL: ${{ secrets.MIKRO_LICENCE_URL || 'download.mikrotik.com' }}
  CUSTOM_LICENCE_URL: ${{ secrets.CUSTOM_LICENCE_URL || 'download.mikrotik.com' }}
  MIKRO_UPGRADE_URL: ${{ secrets.MIKRO_UPGRADE_URL || 'download.mikrotik.com' }}
  CUSTOM_UPGRADE_URL: ${{ secrets.CUSTOM_UPGRADE_URL || 'download.mikrotik.com' }}
  MIKRO_RENEW_URL: ${{ secrets.MIKRO_RENEW_URL || 'download.mikrotik.com' }}
  CUSTOM_RENEW_URL: ${{ secrets.CUSTOM_RENEW_URL || 'download.mikrotik.com' }}
  MIKRO_CLOUD_URL: ${{ secrets.MIKRO_CLOUD_URL || 'download.mikrotik.com' }}
  CUSTOM_CLOUD_URL: ${{ secrets.CUSTOM_CLOUD_URL || 'download.mikrotik.com' }}

jobs:
  Set_Variables:
    runs-on: ubuntu-22.04
    outputs:
      BUILD_TIME: ${{ steps.set_vars.outputs.BUILD_TIME }}
      RELEASE: ${{ steps.set_vars.outputs.RELEASE }}
      MATRIX_JSON: ${{ steps.set_vars.outputs.MATRIX_JSON }}
    steps:
      - name: Set variables
        id: set_vars
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            BUILD_TIME="${{ github.event.inputs.buildtime }}"
            RELEASE="${{ github.event.inputs.release }}"
            if [ -z "$BUILD_TIME" ]; then
              BUILD_TIME=$(date +'%s')
            fi
            if [ -z "$RELEASE" ]; then
              RELEASE=false
            fi
            ARCH="${{ github.event.inputs.arch }}"
            CHANNEL="${{ github.event.inputs.channel }}"
            MATRIX_JSON=$(jq -nc --arg arch "$ARCH" --arg channel "$CHANNEL" '[{arch: $arch, channel: $channel}]')
          else
            BUILD_TIME=$(date +'%s')
            RELEASE=true
            MATRIX_JSON='[{"arch":"x86","channel":"stable"},{"arch":"arm64","channel":"stable"},{"arch":"x86","channel":"long-term"},{"arch":"arm64","channel":"long-term"},{"arch":"x86","channel":"testing"},{"arch":"arm64","channel":"testing"}]'
          fi
          echo "BUILD_TIME=$BUILD_TIME" >> $GITHUB_OUTPUT
          echo "RELEASE=$RELEASE" >> $GITHUB_OUTPUT
          echo "MATRIX_JSON=$MATRIX_JSON" >> $GITHUB_OUTPUT

  Patch_RouterOS:
    needs: Set_Variables
    runs-on: ubuntu-22.04
    strategy:
      matrix: 
        include: ${{ fromJSON(needs.Set_Variables.outputs.MATRIX_JSON) }}
    env:
      TZ: 'Asia/Shanghai'
      BUILD_TIME: ${{ needs.Set_Variables.outputs.BUILD_TIME }}
      RELEASE: ${{ needs.Set_Variables.outputs.RELEASE }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
        
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install required packages
      run: |
        sudo apt-get update
        sudo apt-get install -y wget p7zip-full mkisofs xorriso qemu-utils lftp sshpass extlinux

    - name: Get latest routeros version
      id: get_latest
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          if [ -n "${{ github.event.inputs.version }}" ]; then
            LATEST_VERSION="${{ github.event.inputs.version }}"
          else
            LATEST_VERSION=$(wget -q -O - https://${{ env.MIKRO_UPGRADE_URL }}/routeros/NEWESTa7.${{ matrix.channel }} | cut -d ' ' -f1)
          fi
        else
          LATEST_VERSION=$(wget -q -O - https://${{ env.MIKRO_UPGRADE_URL }}/routeros/NEWESTa7.${{ matrix.channel }} | cut -d ' ' -f1)
        fi
        echo "LATEST_VERSION=${LATEST_VERSION}" >> $GITHUB_ENV
        echo "has_new_version=true" >> $GITHUB_OUTPUT
        
        # Download CHANGELOG
        wget -q -O CHANGELOG https://${{ env.MIKRO_UPGRADE_URL }}/routeros/$LATEST_VERSION/CHANGELOG
        
        # Set architecture suffix
        if [[ "${{ matrix.arch }}" == "arm64" ]]; then
          echo "ARCH=-arm64" >> $GITHUB_ENV
        elif [[ "${{ matrix.arch }}" == "arm" ]]; then
          echo "ARCH=-arm" >> $GITHUB_ENV
        else
          echo "ARCH=" >> $GITHUB_ENV
        fi
        
        echo "Latest Version: $LATEST_VERSION"
        echo "Architecture: ${{ matrix.arch }}"

    - name: Download and patch ISO (x86/arm64)
      if: (matrix.arch == 'x86' || matrix.arch == 'arm64') && steps.get_latest.outputs.has_new_version == 'true'
      run: |
        # Download ISO
        wget -nv -O mikrotik.iso https://download.mikrotik.com/routeros/$LATEST_VERSION/mikrotik-$LATEST_VERSION$ARCH.iso
        
        # Extract ISO
        mkdir -p iso new_iso
        sudo mount -o loop,ro mikrotik.iso ./iso
        sudo rsync -a ./iso/ ./new_iso/
        sudo umount ./iso
        
        # Find and patch main NPK
        if [ -f ./new_iso/routeros-$LATEST_VERSION$ARCH.npk ]; then
          cp ./new_iso/routeros-$LATEST_VERSION$ARCH.npk ./
          python3 patch.py npk routeros-$LATEST_VERSION$ARCH.npk
          cp -f routeros-$LATEST_VERSION$ARCH.npk ./new_iso/
        fi
        
        # Download all packages if needed
        NPK_FILES=$(find ./new_iso -name "*.npk" | wc -l)
        if [ $NPK_FILES -eq 0 ]; then
          wget -nv -O all_packages.zip https://download.mikrotik.com/routeros/$LATEST_VERSION/all_packages-${{ matrix.arch }}-$LATEST_VERSION.zip
          unzip -o all_packages.zip -d ./new_iso
          rm all_packages.zip
        fi
        
        # Sign all NPK files
        for file in $(find ./new_iso -name "*.npk"); do
          python3 npk.py sign "$file" "$file"
        done
        
        # Create option package if option.sfs exists
        if [ -f option.sfs ]; then
          python3 npk.py create ./new_iso/gps-$LATEST_VERSION$ARCH.npk ./new_iso/option-$LATEST_VERSION$ARCH.npk option ./option.sfs -desc="busybox"
        fi
        
        # Create python3 package if python3.sfs exists
        if [ -f python3.sfs ]; then
          python3 npk.py create ./new_iso/gps-$LATEST_VERSION$ARCH.npk ./new_iso/python3-$LATEST_VERSION$ARCH.npk python3 ./python3.sfs -desc="python 3.11.13"
        fi
        
        # Create all_packages zip
        mkdir -p all_packages
        cp ./new_iso/*.npk ./all_packages/
        cd ./all_packages
        zip -r ../all_packages-${{ matrix.arch }}-$LATEST_VERSION.zip *.npk
        cd ..
        
        # Patch kernel and create final ISO
        mkdir -p efiboot
        sudo mount -o loop ./new_iso/efiboot.img ./efiboot
        
        if [ "${{ matrix.arch }}" == "x86" ]; then
          python3 patch.py kernel ./efiboot/linux.x86_64
          cp ./efiboot/linux.x86_64 ./BOOTX64.EFI
          cp ./BOOTX64.EFI ./new_iso/isolinux/linux
          sudo umount ./efiboot
          mkisofs -o mikrotik-$LATEST_VERSION$ARCH.iso \
                  -V "MikroTik $LATEST_VERSION ${{ matrix.arch }}" \
                  -b isolinux/isolinux.bin \
                  -c isolinux/boot.cat \
                  -no-emul-boot \
                  -boot-load-size 4 \
                  -boot-info-table \
                  -eltorito-alt-boot \
                  -e efiboot.img \
                  -no-emul-boot \
                  -R -J \
                  ./new_iso
        elif [ "${{ matrix.arch }}" == "arm64" ]; then
          python3 patch.py kernel ./efiboot/EFI/BOOT/BOOTAA64.EFI
          sudo umount ./efiboot
          xorriso -as mkisofs -o mikrotik-$LATEST_VERSION$ARCH.iso \
                  -V "MikroTik $LATEST_VERSION ${{ matrix.arch }}" \
                  -b efiboot.img \
                  -no-emul-boot \
                  -R -J \
                  ./new_iso
        fi
        
        rm -rf ./efiboot ./new_iso
        
        echo "ISO patched successfully: mikrotik-$LATEST_VERSION$ARCH.iso"

    - name: Download and patch CHR (x86/arm64)
      if: (matrix.arch == 'x86' || matrix.arch == 'arm64') && steps.get_latest.outputs.has_new_version == 'true'
      run: |
        # Download CHR image
        wget -nv -O chr.img.zip https://download.mikrotik.com/routeros/$LATEST_VERSION/chr-$LATEST_VERSION$ARCH.img.zip
        unzip chr.img.zip
        rm chr.img.zip
        mv chr-$LATEST_VERSION$ARCH.img chr.img
        
        echo "CHR image downloaded, patching..."
        # CHR patching code here (keep your existing CHR patching logic)
        
    - name: Process ARM packages
      if: matrix.arch == 'arm' && steps.get_latest.outputs.has_new_version == 'true'
      run: |
        # Download all packages for ARM
        wget -nv -O all_packages.zip https://download.mikrotik.com/routeros/$LATEST_VERSION/all_packages-arm-$LATEST_VERSION.zip
        wget -nv -O routeros.npk https://download.mikrotik.com/routeros/$LATEST_VERSION/routeros-$LATEST_VERSION-arm.npk
        
        unzip all_packages.zip -d ./all_packages
        cp routeros.npk routeros-$LATEST_VERSION-arm.npk
        
        # Patch main package
        python3 patch.py npk routeros-$LATEST_VERSION-arm.npk
        
        # Sign all packages
        for file in ./all_packages/*.npk; do
          python3 npk.py sign "$file" "$file"
        done
        
        cp -f routeros-$LATEST_VERSION-arm.npk ./all_packages/
        
        # Create option package
        if [ -f option.sfs ]; then
          python3 npk.py create ./all_packages/gps-$LATEST_VERSION-arm.npk ./all_packages/option-$LATEST_VERSION-arm.npk option ./option.sfs -desc="busybox"
        fi
        
        # Create python3 package
        if [ -f python3.sfs ]; then
          python3 npk.py create ./all_packages/gps-$LATEST_VERSION-arm.npk ./all_packages/python3-$LATEST_VERSION-arm.npk python3 ./python3.sfs -desc="python 3.11.13"
        fi
        
        # Create final zip
        cd ./all_packages
        zip -r ../all_packages-arm-$LATEST_VERSION.zip *.npk
        cd ..
        
        echo "ARM packages patched successfully"

    - name: Prepare artifacts
      if: steps.get_latest.outputs.has_new_version == 'true'
      run: |
        mkdir -p ./artifacts/${{ env.LATEST_VERSION }}/${{ matrix.arch }}
        
        # Copy all generated files
        [ -f mikrotik-${{ env.LATEST_VERSION }}${{ env.ARCH }}.iso ] && cp mikrotik-${{ env.LATEST_VERSION }}${{ env.ARCH }}.iso ./artifacts/${{ env.LATEST_VERSION }}/${{ matrix.arch }}/ 2>/dev/null || true
        [ -f all_packages-${{ matrix.arch }}-${{ env.LATEST_VERSION }}.zip ] && cp all_packages-${{ matrix.arch }}-${{ env.LATEST_VERSION }}.zip ./artifacts/${{ env.LATEST_VERSION }}/${{ matrix.arch }}/ 2>/dev/null || true
        [ -f routeros-${{ env.LATEST_VERSION }}${{ env.ARCH }}.npk ] && cp routeros-${{ env.LATEST_VERSION }}${{ env.ARCH }}.npk ./artifacts/${{ env.LATEST_VERSION }}/${{ matrix.arch }}/ 2>/dev/null || true
        [ -f CHANGELOG ] && cp CHANGELOG ./artifacts/${{ env.LATEST_VERSION }}/${{ matrix.arch }}/ 2>/dev/null || true
        
        # Copy CHR files if they exist
        ls chr-${{ env.LATEST_VERSION }}*.zip 2>/dev/null && cp chr-${{ env.LATEST_VERSION }}*.zip ./artifacts/${{ env.LATEST_VERSION }}/${{ matrix.arch }}/ 2>/dev/null || true
        
        echo "Artifacts prepared for ${{ matrix.arch }}"

    - name: Upload artifacts
      if: steps.get_latest.outputs.has_new_version == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: mikrotik-patched-${{ env.LATEST_VERSION }}-${{ matrix.arch }}-${{ matrix.channel }}
        path: ./artifacts/${{ env.LATEST_VERSION }}/${{ matrix.arch }}/
        retention-days: 90

    - name: Create GitHub Release
      if: steps.get_latest.outputs.has_new_version == 'true' && env.RELEASE == 'true'
      uses: softprops/action-gh-release@v2
      with:
        name: "RouterOS ${{ env.LATEST_VERSION }} (${{ matrix.arch }} - ${{ matrix.channel }})"
        body_path: "CHANGELOG"
        tag_name: ${{ env.LATEST_VERSION }}-${{ matrix.arch }}-${{ matrix.channel }}
        make_latest: ${{ matrix.channel == 'stable' && matrix.arch == 'x86' }}
        prerelease: ${{ matrix.channel == 'testing' }}
        files: |
          mikrotik-${{ env.LATEST_VERSION }}${{ env.ARCH }}.iso
          chr-${{ env.LATEST_VERSION }}*.zip
          routeros-${{ env.LATEST_VERSION }}${{ env.ARCH }}.npk
          all_packages-*-${{ env.LATEST_VERSION }}.zip
