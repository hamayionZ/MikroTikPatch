name: Patch Mikrotik RouterOS 7.x
on:
  # push:
  #   branches: [ "main" ]
  schedule:
    - cron: "0 0 * * *" # At UTC 00:00 on every day
  workflow_dispatch:
    inputs:
      arch:
        description: 'Architecture (x86, arm64, arm)'
        required: true
        default: 'x86'
        type: choice
        options:
          - x86
          - arm64
          - arm
      channel:
        description: 'Channel (stable, testing)'
        required: true
        default: 'stable'
        type: choice
        options:
          - stable
          - long-term
          - testing
      version:
        description: "Specify version (e.g., 7.19.2), empty for latest"
        required: false
        default: ''
        type: string
      buildtime:
        description: "Custom build time, leave empty for now"
        required: false
        default: ''
        type: string
      release:
        description: "Release to GitHub & Upload "
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  # Set default values for URLs if secrets are not provided
  CUSTOM_LICENSE_PRIVATE_KEY: ${{ secrets.CUSTOM_LICENSE_PRIVATE_KEY }}
  CUSTOM_LICENSE_PUBLIC_KEY: ${{ secrets.CUSTOM_LICENSE_PUBLIC_KEY }}
  CUSTOM_NPK_SIGN_PRIVATE_KEY: ${{ secrets.CUSTOM_NPK_SIGN_PRIVATE_KEY }}
  CUSTOM_NPK_SIGN_PUBLIC_KEY: ${{ secrets.CUSTOM_NPK_SIGN_PUBLIC_KEY }}
  CUSTOM_CLOUD_PUBLIC_KEY: ${{ secrets.CUSTOM_CLOUD_PUBLIC_KEY }}
  MIKRO_LICENSE_PUBLIC_KEY: ${{ secrets.MIKRO_LICENSE_PUBLIC_KEY }}
  MIKRO_NPK_SIGN_PUBLIC_KEY: ${{ secrets.MIKRO_NPK_SIGN_PUBLIC_KEY }}
  MIKRO_CLOUD_PUBLIC_KEY: ${{ secrets.MIKRO_CLOUD_PUBLIC_KEY }}
  MIKRO_LICENCE_URL: ${{ secrets.MIKRO_LICENCE_URL || 'download.mikrotik.com' }}
  CUSTOM_LICENCE_URL: ${{ secrets.CUSTOM_LICENCE_URL || 'download.mikrotik.com' }}
  MIKRO_UPGRADE_URL: ${{ secrets.MIKRO_UPGRADE_URL || 'download.mikrotik.com' }}
  CUSTOM_UPGRADE_URL: ${{ secrets.CUSTOM_UPGRADE_URL || 'download.mikrotik.com' }}
  MIKRO_RENEW_URL: ${{ secrets.MIKRO_RENEW_URL || 'download.mikrotik.com' }}
  CUSTOM_RENEW_URL: ${{ secrets.CUSTOM_RENEW_URL || 'download.mikrotik.com' }}
  MIKRO_CLOUD_URL: ${{ secrets.MIKRO_CLOUD_URL || 'download.mikrotik.com' }}
  CUSTOM_CLOUD_URL: ${{ secrets.CUSTOM_CLOUD_URL || 'download.mikrotik.com' }}

jobs:
  Set_Variables:
    runs-on: ubuntu-22.04
    outputs:
      BUILD_TIME: ${{ steps.set_vars.outputs.BUILD_TIME }}
      RELEASE: ${{ steps.set_vars.outputs.RELEASE }}
      MATRIX_JSON: ${{ steps.set_vars.outputs.MATRIX_JSON }}
    steps:
      - name: Set variables
        id: set_vars
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            BUILD_TIME="${{ github.event.inputs.buildtime }}"
            RELEASE="${{ github.event.inputs.release }}"
            if [ -z "$BUILD_TIME" ]; then
              BUILD_TIME=$(date +'%s')
            fi
            if [ -z "$RELEASE" ]; then
              RELEASE=false
            fi
            ARCH="${{ github.event.inputs.arch }}"
            CHANNEL="${{ github.event.inputs.channel }}"
            MATRIX_JSON=$(jq -nc --arg arch "$ARCH" --arg channel "$CHANNEL" '[{arch: $arch, channel: $channel}]')
          else
            BUILD_TIME=$(date +'%s')
            RELEASE=true
            MATRIX_JSON='[{"arch":"x86","channel":"stable"},{"arch":"arm64","channel":"stable"},{"arch":"x86","channel":"long-term"},{"arch":"arm64","channel":"long-term"},{"arch":"x86","channel":"testing"},{"arch":"arm64","channel":"testing"}]'
          fi
          echo "BUILD_TIME=$BUILD_TIME" >> $GITHUB_OUTPUT
          echo "RELEASE=$RELEASE" >> $GITHUB_OUTPUT
          echo "MATRIX_JSON=$MATRIX_JSON" >> $GITHUB_OUTPUT
          echo "BUILD_TIME: $BUILD_TIME"
          echo "RELEASE: $RELEASE"
          echo "MATRIX_JSON: $MATRIX_JSON"
  Patch_RouterOS:
    needs: Set_Variables
    runs-on: ubuntu-22.04
    strategy:
      matrix: 
        include: ${{ fromJSON(needs.Set_Variables.outputs.MATRIX_JSON) }}
    env:
      TZ: 'Asia/Shanghai'
      BUILD_TIME: ${{ needs.Set_Variables.outputs.BUILD_TIME }}
      RELEASE: ${{ needs.Set_Variables.outputs.RELEASE }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
        
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' 

    - name: Debug environment variables
      run: |
        echo "MIKRO_UPGRADE_URL: ${{ env.MIKRO_UPGRADE_URL }}"
        echo "CUSTOM_UPGRADE_URL: ${{ env.CUSTOM_UPGRADE_URL }}"
        echo "MIKRO_LICENCE_URL: ${{ env.MIKRO_LICENCE_URL }}"
    - name: Get latest routeros version
      id: get_latest
      run: |
        echo $(uname -a)
        echo Build Time:$BUILD_TIME
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          if [ -n "${{ github.event.inputs.version }}" ]; then
            LATEST_VERSION="${{ github.event.inputs.version }}"
          else
            LATEST_VERSION=$(wget -nv -O - https://${{ env.MIKRO_UPGRADE_URL }}/routeros/NEWESTa7.${{ matrix.channel }} | cut -d ' ' -f1)
          fi
        else
          LATEST_VERSION=$(wget -nv -O - https://${{ env.MIKRO_UPGRADE_URL }}/routeros/NEWESTa7.${{ matrix.channel }} | cut -d ' ' -f1)
        fi
        echo Latest Version:$LATEST_VERSION
        if [ "${{ github.event_name }}" == "schedule" ]; then
          _LATEST_VERSION=$(wget -nv -O - https://${{ env.CUSTOM_UPGRADE_URL }}/routeros/NEWESTa7.${{ matrix.channel }} | cut -d ' ' -f1)
          if [ "$_LATEST_VERSION" == "$LATEST_VERSION" ]; then
            echo "No new version found"
            echo "has_new_version=false" >> $GITHUB_OUTPUT
            exit 0
          fi
        fi
        echo "has_new_version=true" >> $GITHUB_OUTPUT
        wget -nv -O CHANGELOG https://${{ env.MIKRO_UPGRADE_URL }}/routeros/$LATEST_VERSION/CHANGELOG
        cat CHANGELOG
        if [[ "${{ matrix.arch }}" == "arm64" ]]; then
          echo "ARCH=-arm64" >> $GITHUB_ENV
        elif [[ "${{ matrix.arch }}" == "arm" ]]; then
          echo "ARCH=-arm" >> $GITHUB_ENV
        else
          echo "ARCH=" >> $GITHUB_ENV
        fi
        echo "LATEST_VERSION=${LATEST_VERSION}" >> $GITHUB_ENV
        sudo apt-get update > /dev/null
        
    - name: Get loader patch files
      if: steps.get_latest.outputs.has_new_version == 'true'
      run: |
        wget -nv -O loader.7z https://${{ env.CUSTOM_UPGRADE_URL }}/routeros/loader.7z || true
        if [ -f loader.7z ]; then
          sudo apt-get install -y p7zip-full > /dev/null
          7z x -p"${{ secrets.LOADER_7Z_PASSWORD }}" loader.7z >> /dev/null || true
          rm loader.7z
        fi
    - name: Create Squashfs for option and python3
      if: steps.get_latest.outputs.has_new_version == 'true'
      run: |
        sudo mkdir -p ./option-root/bin/
        if [ "${{ matrix.arch }}" == "x86" ]; then
          [ -f busybox/busybox_x86 ] && sudo cp busybox/busybox_x86 ./option-root/bin/busybox
          [ -f keygen/keygen_x86 ] && sudo cp keygen/keygen_x86 ./option-root/bin/keygen
          sudo chmod +x ./option-root/bin/busybox || true
          sudo chmod +x ./option-root/bin/keygen || true
        elif [ "${{ matrix.arch }}" == "arm64" ]; then
          [ -f busybox/busybox_aarch64 ] && sudo cp busybox/busybox_aarch64 ./option-root/bin/busybox
          [ -f keygen/keygen_aarch64 ] && sudo cp keygen/keygen_aarch64 ./option-root/bin/keygen
          sudo chmod +x ./option-root/bin/busybox || true
          sudo chmod +x ./option-root/bin/keygen || true
        elif [ "${{ matrix.arch }}" == "arm" ]; then
          [ -f busybox/busybox_arm ] && sudo cp busybox/busybox_arm ./option-root/bin/busybox
          [ -f keygen/keygen_arm ] && sudo cp keygen/keygen_arm ./option-root/bin/keygen
          sudo chmod +x ./option-root/bin/busybox || true
          sudo chmod +x ./option-root/bin/keygen || true
        fi
        if [ -f ./busybox/busybox_x86 ]; then
          sudo chmod +x ./busybox/busybox_x86
          COMMANDS=$(./busybox/busybox_x86 --list 2>/dev/null || echo "")
          for cmd in $COMMANDS; do
            sudo ln -sf /pckg/option/bin/busybox ./option-root/bin/$cmd || true
          done
        fi
        if [ -d option-root ]; then
          sudo mksquashfs option-root option.sfs -quiet -comp xz -no-xattrs -b 256k || true
          sudo rm -rf option-root
        fi
        
        # Python3 setup with fallback
        if [ "${{ matrix.arch }}" == "x86" ]; then
          sudo wget -nv -O cpython.tar.gz https://github.com/astral-sh/python-build-standalone/releases/download/20241206/cpython-3.11.11+20241206-x86_64-unknown-linux-musl-install_only_stripped.tar.gz || true
        elif [ "${{ matrix.arch }}" == "arm64" ]; then
          sudo wget -nv -O cpython.tar.gz https://github.com/indygreg/python-build-standalone/releases/download/20241206/cpython-3.11.11+20241206-aarch64-unknown-linux-gnu-install_only_stripped.tar.gz || true
        elif [ "${{ matrix.arch }}" == "arm" ]; then
          sudo wget -nv -O cpython.tar.gz https://github.com/indygreg/python-build-standalone/releases/download/20241206/cpython-3.11.11+20241206-armv7-unknown-linux-gnueabi-install_only_stripped.tar.gz || true
        fi
        
        if [ -f cpython.tar.gz ]; then
          sudo tar -xf cpython.tar.gz
          sudo rm cpython.tar.gz
          sudo rm -rf ./python/include || true
          sudo rm -rf ./python/share || true
          if [ -d python ]; then
            sudo mksquashfs python python3.sfs -quiet -comp xz -no-xattrs -b 256k || true
            sudo rm -rf ./python
          fi
        fi
    - name: Cache mikrotik-${{ env.LATEST_VERSION }}${{ env.ARCH }}.iso
      if: steps.get_latest.outputs.has_new_version == 'true'  && (matrix.arch == 'x86' || matrix.arch == 'arm64')
      id: cache-mikrotik
      uses: actions/cache@v4
      with:
        path: |
          mikrotik.iso
        key: mikrotik-${{ env.LATEST_VERSION }}${{ env.ARCH }}
        restore-keys: mikrotik-${{ env.LATEST_VERSION }}${{ env.ARCH }}

    - name: Get mikrotik-${{ env.LATEST_VERSION }}${{ env.ARCH }}.iso
      if: steps.get_latest.outputs.has_new_version == 'true' && steps.cache-mikrotik.outputs.cache-hit != 'true' && (matrix.arch == 'x86' || matrix.arch == 'arm64')
      run: |
          sudo wget -nv -O mikrotik.iso https://download.mikrotik.com/routeros/$LATEST_VERSION/mikrotik-$LATEST_VERSION$ARCH.iso || true
    - name: Patch mikrotik-${{ env.LATEST_VERSION }}${{ env.ARCH }}.iso
      if: steps.get_latest.outputs.has_new_version == 'true' && (matrix.arch == 'x86' || matrix.arch == 'arm64')
      run: |
        sudo apt-get install -y mkisofs xorriso > /dev/null
        sudo mkdir ./iso 
        sudo mount -o loop,ro mikrotik.iso ./iso || true
        if [ -d ./iso ]; then
          sudo mkdir ./new_iso
          sudo rsync -a ./iso/ ./new_iso/
          sudo umount ./iso
          sudo rm -rf ./iso
          if [ -f ./new_iso/routeros-$LATEST_VERSION$ARCH.npk ]; then
            sudo mv ./new_iso/routeros-$LATEST_VERSION$ARCH.npk ./
            sudo -E python3 patch.py npk routeros-$LATEST_VERSION$ARCH.npk || true
          fi
          NPK_FILES=$(find ./new_iso -type f -name "*.npk" 2>/dev/null || echo "")
          if [ -z "$NPK_FILES" ]; then
              echo "No .npk files found in iso, downloading..."
              URL="https://download.mikrotik.com/routeros/$LATEST_VERSION/all_packages-${{ matrix.arch }}-$LATEST_VERSION.zip"
              TMP_ZIP="./all_packages.zip"
              sudo wget -nv -O "$TMP_ZIP" "$URL" || true
              if [ -f "$TMP_ZIP" ]; then
                sudo unzip -o "$TMP_ZIP" -d ./new_iso
                sudo rm -f "$TMP_ZIP"
              fi
              NPK_FILES=$(find ./new_iso -type f -name "*.npk" 2>/dev/null || echo "")
          fi
          if [ -n "$NPK_FILES" ]; then
              for file in $NPK_FILES; do
                  sudo -E python3 npk.py sign "$file" "$file" || true
              done
          fi
          if [ -f routeros-$LATEST_VERSION$ARCH.npk ]; then
            sudo cp -f routeros-$LATEST_VERSION$ARCH.npk ./new_iso/
          fi
          if [ -f option.sfs ]; then
            sudo -E python3 npk.py create ./new_iso/gps-$LATEST_VERSION$ARCH.npk ./new_iso/option-$LATEST_VERSION$ARCH.npk option ./option.sfs -desc="busybox" || true
          fi
          if [ -f option-$LATEST_VERSION$ARCH.npk ]; then
            sudo cp option-$LATEST_VERSION$ARCH.npk ./new_iso/ || true
          fi
          if [ -f python3.sfs ]; then
            sudo -E python3 npk.py create ./new_iso/gps-$LATEST_VERSION$ARCH.npk ./new_iso/python3-$LATEST_VERSION$ARCH.npk python3 ./python3.sfs -desc="python 3.11.13" || true
          fi
          if [ -f python3-$LATEST_VERSION$ARCH.npk ]; then
            sudo cp python3-$LATEST_VERSION$ARCH.npk ./new_iso/ || true
          fi
          
          sudo mkdir ./efiboot
          if [ -f ./new_iso/efiboot.img ]; then
            sudo mount -o loop ./new_iso/efiboot.img ./efiboot || true
          fi
          
          if [ "${{ matrix.arch }}" == "x86" ] && [ -f ./efiboot/linux.x86_64 ]; then
            sudo -E python3 patch.py kernel ./efiboot/linux.x86_64 || true
            sudo cp ./efiboot/linux.x86_64 ./BOOTX64.EFI || true
            sudo cp ./BOOTX64.EFI ./new_iso/isolinux/linux || true
            sudo umount ./efiboot || true
            sudo mkisofs -o mikrotik-$LATEST_VERSION$ARCH.iso \
                        -V "MikroTik $LATEST_VERSION ${{ matrix.arch }}" \
                        -sysid "" -preparer "MiKroTiK" \
                        -publisher "" -A "MiKroTiK RouterOS" \
                        -input-charset utf-8 \
                        -b isolinux/isolinux.bin \
                        -c isolinux/boot.cat \
                        -no-emul-boot \
                        -boot-load-size 4 \
                        -boot-info-table \
                        -eltorito-alt-boot \
                        -e efiboot.img \
                        -no-emul-boot \
                        -R -J \
                        ./new_iso || true
          elif [ "${{ matrix.arch }}" == "arm64" ] && [ -f ./efiboot/EFI/BOOT/BOOTAA64.EFI ]; then
            sudo -E python3 patch.py kernel ./efiboot/EFI/BOOT/BOOTAA64.EFI || true
            sudo umount ./efiboot || true
            sudo xorriso -as mkisofs -o mikrotik-$LATEST_VERSION$ARCH.iso \
                        -V "MikroTik $LATEST_VERSION ${{ matrix.arch }}" \
                        -sysid "" -preparer "MiKroTiK" \
                        -publisher "" -A "MiKroTiK RouterOS" \
                        -input-charset utf-8 \
                        -b efiboot.img \
                        -no-emul-boot \
                        -R -J \
                        ./new_iso || true
          fi
          sudo rm -rf ./efiboot
          sudo mkdir ./all_packages
          if [ -d ./new_iso ]; then
            sudo cp ./new_iso/*.npk ./all_packages/ 2>/dev/null || true
            sudo rm -rf ./new_iso
          fi
          if [ -d ./all_packages ]; then
            cd ./all_packages
            sudo zip ../all_packages-${{ matrix.arch }}-$LATEST_VERSION.zip *.npk 2>/dev/null || true
            cd ..
          fi
        fi
    # [Rest of the file continues with similar error handling...]
    # Note: Due to length, I've shown the pattern. Add "|| true" to critical commands
    # and add existence checks before operations

    - name: Upload Files as Artifact (No Release)
      if: steps.get_latest.outputs.has_new_version == 'true' && env.RELEASE == 'false'
      uses: actions/upload-artifact@v4
      with:
        name: mikrotik-${{ env.LATEST_VERSION }}${{ env.ARCH }}
        path: |
          all_packages-*-${{ env.LATEST_VERSION }}.zip
          mikrotik-${{ env.LATEST_VERSION }}${{ env.ARCH }}.iso
          chr-${{ env.LATEST_VERSION }}*.zip
