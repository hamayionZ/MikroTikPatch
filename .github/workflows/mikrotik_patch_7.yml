name: Patch Mikrotik RouterOS 7.x
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      arch:
        description: 'Architecture (x86, arm64, arm)'
        required: true
        default: 'x86'
        type: choice
        options:
          - x86
          - arm64
          - arm
      channel:
        description: 'Channel (stable, testing)'
        required: true
        default: 'stable'
        type: choice
        options:
          - stable
          - long-term
          - testing
      version:
        description: "Specify version (e.g., 7.19.2), empty for latest"
        required: false
        default: ''
        type: string
      buildtime:
        description: "Custom build time, leave empty for now"
        required: false
        default: ''
        type: string
      release:
        description: "Release to GitHub & Upload"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  CUSTOM_LICENSE_PRIVATE_KEY: ${{ secrets.CUSTOM_LICENSE_PRIVATE_KEY }}
  CUSTOM_LICENSE_PUBLIC_KEY: ${{ secrets.CUSTOM_LICENSE_PUBLIC_KEY }}
  CUSTOM_NPK_SIGN_PRIVATE_KEY: ${{ secrets.CUSTOM_NPK_SIGN_PRIVATE_KEY }}
  CUSTOM_NPK_SIGN_PUBLIC_KEY: ${{ secrets.CUSTOM_NPK_SIGN_PUBLIC_KEY }}
  CUSTOM_CLOUD_PUBLIC_KEY: ${{ secrets.CUSTOM_CLOUD_PUBLIC_KEY }}
  MIKRO_LICENSE_PUBLIC_KEY: ${{ secrets.MIKRO_LICENSE_PUBLIC_KEY }}
  MIKRO_NPK_SIGN_PUBLIC_KEY: ${{ secrets.MIKRO_NPK_SIGN_PUBLIC_KEY }}
  MIKRO_CLOUD_PUBLIC_KEY: ${{ secrets.MIKRO_CLOUD_PUBLIC_KEY }}
  MIKRO_LICENCE_URL: ${{ secrets.MIKRO_LICENCE_URL || 'download.mikrotik.com' }}
  CUSTOM_LICENCE_URL: ${{ secrets.CUSTOM_LICENCE_URL || 'download.mikrotik.com' }}
  MIKRO_UPGRADE_URL: ${{ secrets.MIKRO_UPGRADE_URL || 'download.mikrotik.com' }}
  CUSTOM_UPGRADE_URL: ${{ secrets.CUSTOM_UPGRADE_URL || 'download.mikrotik.com' }}
  MIKRO_RENEW_URL: ${{ secrets.MIKRO_RENEW_URL || 'download.mikrotik.com' }}
  CUSTOM_RENEW_URL: ${{ secrets.CUSTOM_RENEW_URL || 'download.mikrotik.com' }}
  MIKRO_CLOUD_URL: ${{ secrets.MIKRO_CLOUD_URL || 'download.mikrotik.com' }}
  CUSTOM_CLOUD_URL: ${{ secrets.CUSTOM_CLOUD_URL || 'download.mikrotik.com' }}

jobs:
  Set_Variables:
    runs-on: ubuntu-22.04
    outputs:
      BUILD_TIME: ${{ steps.set_vars.outputs.BUILD_TIME }}
      RELEASE: ${{ steps.set_vars.outputs.RELEASE }}
      MATRIX_JSON: ${{ steps.set_vars.outputs.MATRIX_JSON }}
    steps:
      - name: Set variables
        id: set_vars
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            BUILD_TIME="${{ github.event.inputs.buildtime }}"
            RELEASE="${{ github.event.inputs.release }}"
            [ -z "$BUILD_TIME" ] && BUILD_TIME=$(date +'%s')
            [ -z "$RELEASE" ] && RELEASE=false
            ARCH="${{ github.event.inputs.arch }}"
            CHANNEL="${{ github.event.inputs.channel }}"
            MATRIX_JSON=$(jq -nc --arg arch "$ARCH" --arg channel "$CHANNEL" '[{arch: $arch, channel: $channel}]')
          else
            BUILD_TIME=$(date +'%s')
            RELEASE=true
            MATRIX_JSON='[{"arch":"x86","channel":"stable"},{"arch":"arm64","channel":"stable"},{"arch":"x86","channel":"long-term"},{"arch":"arm64","channel":"long-term"},{"arch":"x86","channel":"testing"},{"arch":"arm64","channel":"testing"}]'
          fi
          echo "BUILD_TIME=$BUILD_TIME" >> $GITHUB_OUTPUT
          echo "RELEASE=$RELEASE" >> $GITHUB_OUTPUT
          echo "MATRIX_JSON=$MATRIX_JSON" >> $GITHUB_OUTPUT

  Patch_RouterOS:
    needs: Set_Variables
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        include: ${{ fromJSON(needs.Set_Variables.outputs.MATRIX_JSON) }}
    env:
      TZ: 'Asia/Shanghai'
      BUILD_TIME: ${{ needs.Set_Variables.outputs.BUILD_TIME }}
      RELEASE: ${{ needs.Set_Variables.outputs.RELEASE }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install required packages
      run: |
        sudo apt-get update
        sudo apt-get install -y wget p7zip-full mkisofs xorriso qemu-utils lftp sshpass extlinux squashfs-tools
        pip install pefile pyelftools

    - name: Get latest routeros version
      id: get_latest
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          if [ -n "${{ github.event.inputs.version }}" ]; then
            LATEST_VERSION="${{ github.event.inputs.version }}"
          else
            LATEST_VERSION=$(wget -q -O - https://${{ env.MIKRO_UPGRADE_URL }}/routeros/NEWESTa7.${{ matrix.channel }} | cut -d ' ' -f1)
          fi
        else
          LATEST_VERSION=$(wget -q -O - https://${{ env.MIKRO_UPGRADE_URL }}/routeros/NEWESTa7.${{ matrix.channel }} | cut -d ' ' -f1)
        fi
        echo "LATEST_VERSION=${LATEST_VERSION}" >> $GITHUB_ENV
        echo "has_new_version=true" >> $GITHUB_OUTPUT

        # Download CHANGELOG
        wget -q -O CHANGELOG https://${{ env.MIKRO_UPGRADE_URL }}/routeros/$LATEST_VERSION/CHANGELOG || echo "Changelog not found" > CHANGELOG

        # Set architecture suffix
        if [[ "${{ matrix.arch }}" == "arm64" ]]; then
          echo "ARCH=-arm64" >> $GITHUB_ENV
        elif [[ "${{ matrix.arch }}" == "arm" ]]; then
          echo "ARCH=-arm" >> $GITHUB_ENV
        else
          echo "ARCH=" >> $GITHUB_ENV
        fi

        echo "Latest Version: $LATEST_VERSION"
        echo "Architecture: ${{ matrix.arch }}"

 - name: Download and patch ISO (x86/arm64)
   if: (matrix.arch == 'x86' || matrix.arch == 'arm64') && steps.get_latest.outputs.has_new_version == 'true'
  run: |
    set -e
    # Download ISO
    wget -nv -O mikrotik.iso https://download.mikrotik.com/routeros/$LATEST_VERSION/mikrotik-$LATEST_VERSION$ARCH.iso || \
    wget -nv -O mikrotik.iso https://download.mikrotik.com/routeros/$LATEST_VERSION/mikrotik-$LATEST_VERSION.iso

    # Extract ISO
    mkdir -p iso new_iso
    sudo mount -o loop,ro mikrotik.iso ./iso
    sudo rsync -a ./iso/ ./new_iso/
    sudo chmod -R u+rw ./new_iso
    sudo umount ./iso

    # Patch main NPK
    if [ -f ./new_iso/routeros-$LATEST_VERSION$ARCH.npk ]; then
      sudo cp ./new_iso/routeros-$LATEST_VERSION$ARCH.npk ./
      sudo chown $USER:$USER routeros-$LATEST_VERSION$ARCH.npk
      python3 patch.py npk routeros-$LATEST_VERSION$ARCH.npk || true
      sudo cp -f routeros-$LATEST_VERSION$ARCH.npk ./new_iso/
      sudo chmod 644 ./new_iso/routeros-$LATEST_VERSION$ARCH.npk
    fi

    # Download all packages if needed
    NPK_FILES=$(find ./new_iso -name "*.npk" | wc -l)
    if [ $NPK_FILES -eq 0 ]; then
      wget -nv -O all_packages.zip https://download.mikrotik.com/routeros/$LATEST_VERSION/all_packages-${{ matrix.arch }}-$LATEST_VERSION.zip || true
      if [ -f all_packages.zip ]; then
        unzip -o all_packages.zip -d ./new_iso
        sudo chmod -R 644 ./new_iso/*.npk 2>/dev/null || true
        rm all_packages.zip
      fi
    fi

    # Add optional packages (option.sfs, python3.sfs)
    for sfs_file in option.sfs python3.sfs; do
      if [ -f "$sfs_file" ]; then
        pkg_name=$(basename "$sfs_file" .sfs)
        BASE_NPK=$(find ./new_iso -name "*.npk" | head -1)
        if [ -n "$BASE_NPK" ] && [ -f npk.py ]; then
          cp "$BASE_NPK" ./base.npk
          python3 npk.py create ./base.npk "./new_iso/${pkg_name}-${LATEST_VERSION}${ARCH}.npk" "$pkg_name" "$sfs_file" -desc="Custom $pkg_name" || true
        fi
      fi
    done

    # Sign all NPK files (skip if keys missing)
    for file in $(find ./new_iso -name "*.npk"); do
      if [ -f npk.py ]; then
        temp_file="/tmp/$(basename $file)"
        sudo cp "$file" "$temp_file"
        sudo chown $USER:$USER "$temp_file"
        python3 npk.py sign "$temp_file" "$temp_file" || true
        sudo cp "$temp_file" "$file"
        sudo chmod 644 "$file"
        rm -f "$temp_file"
      fi
    done

    # Patch kernel inside efiboot.img and isolinux
    if [ -f ./new_iso/efiboot.img ]; then
      mkdir -p efiboot
      sudo mount -o loop ./new_iso/efiboot.img ./efiboot
      sudo chmod -R u+rw ./efiboot 2>/dev/null || true

      if [ "${{ matrix.arch }}" == "x86" ]; then
        # Patch EFI kernel
        if [ -f ./efiboot/EFI/BOOT/BOOTX64.EFI ]; then
          sudo cp ./efiboot/EFI/BOOT/BOOTX64.EFI ./BOOTX64.EFI
          sudo chown $USER:$USER ./BOOTX64.EFI
          python3 patch.py kernel ./BOOTX64.EFI
          sudo cp ./BOOTX64.EFI ./efiboot/EFI/BOOT/BOOTX64.EFI
        fi
        # Patch legacy BIOS kernel
        if [ -f ./new_iso/isolinux/linux ]; then
          sudo cp ./new_iso/isolinux/linux ./linux
          sudo chown $USER:$USER ./linux
          python3 patch.py kernel ./linux
          sudo cp ./linux ./new_iso/isolinux/linux
        fi
      elif [ "${{ matrix.arch }}" == "arm64" ]; then
        if [ -f ./efiboot/EFI/BOOT/BOOTAA64.EFI ]; then
          sudo cp ./efiboot/EFI/BOOT/BOOTAA64.EFI ./BOOTAA64.EFI
          sudo chown $USER:$USER ./BOOTAA64.EFI
          python3 patch.py kernel ./BOOTAA64.EFI
          sudo cp ./BOOTAA64.EFI ./efiboot/EFI/BOOT/BOOTAA64.EFI
        fi
      fi

      sudo umount ./efiboot
    fi

    # Create final ISO with xorriso (works for both architectures)
    # For x86: include BIOS boot via isolinux, EFI via efiboot.img
    # For arm64: only EFI boot
    if [ "${{ matrix.arch }}" == "x86" ]; then
      xorriso -as mkisofs -o mikrotik-$LATEST_VERSION$ARCH.iso \
              -V "MikroTik $LATEST_VERSION ${{ matrix.arch }}" \
              -b isolinux/isolinux.bin \
              -c isolinux/boot.cat \
              -no-emul-boot \
              -boot-load-size 4 \
              -boot-info-table \
              -eltorito-alt-boot \
              -e efiboot.img \
              -no-emul-boot \
              -R -J \
              ./new_iso
    else
      xorriso -as mkisofs -o mikrotik-$LATEST_VERSION$ARCH.iso \
              -V "MikroTik $LATEST_VERSION ${{ matrix.arch }}" \
              -b efiboot.img \
              -no-emul-boot \
              -R -J \
              ./new_iso
    fi

    # Verify ISO is bootable
    if [ -f mikrotik-$LATEST_VERSION$ARCH.iso ]; then
      echo "ISO size: $(stat -c %s mikrotik-$LATEST_VERSION$ARCH.iso) bytes"
      xorriso -report_el_torito mikrotik-$LATEST_VERSION$ARCH.iso || true
    else
      echo "ERROR: ISO file not created!"
      exit 1
    fi

    # Clean up
    sudo rm -rf ./efiboot ./new_iso

    - name: Process ARM packages
      if: matrix.arch == 'arm' && steps.get_latest.outputs.has_new_version == 'true'
      run: |
        set -e
        # Download all packages for ARM
        wget -nv -O all_packages.zip https://download.mikrotik.com/routeros/$LATEST_VERSION/all_packages-arm-$LATEST_VERSION.zip || true
        wget -nv -O routeros.npk https://download.mikrotik.com/routeros/$LATEST_VERSION/routeros-$LATEST_VERSION-arm.npk || true

        mkdir -p all_packages
        if [ -f all_packages.zip ]; then
          unzip -o all_packages.zip -d all_packages
          rm all_packages.zip
        fi

        if [ -f routeros.npk ]; then
          cp routeros.npk routeros-$LATEST_VERSION-arm.npk
          python3 patch.py npk routeros-$LATEST_VERSION-arm.npk || true
        fi

        # Add optional packages
        for sfs_file in option.sfs python3.sfs; do
          if [ -f "$sfs_file" ]; then
            pkg_name=$(basename "$sfs_file" .sfs)
            BASE_NPK=$(find all_packages -name "*.npk" | head -1)
            if [ -n "$BASE_NPK" ] && [ -f npk.py ]; then
              cp "$BASE_NPK" ./base.npk
              python3 npk.py create ./base.npk "all_packages/${pkg_name}-${LATEST_VERSION}-arm.npk" "$pkg_name" "$sfs_file" -desc="Custom $pkg_name"
            fi
          fi
        done

        # Sign all packages
        for file in all_packages/*.npk; do
          if [ -f npk.py ]; then
            python3 npk.py sign "$file" "$file" || true
          fi
        done

        # Include main NPK if exists
        if [ -f routeros-$LATEST_VERSION-arm.npk ]; then
          cp routeros-$LATEST_VERSION-arm.npk all_packages/
        fi

        # Create final zip
        cd all_packages
        zip -r ../all_packages-arm-$LATEST_VERSION.zip *.npk
        cd ..

        echo "ARM packages patched successfully"

    - name: Prepare artifacts
      if: steps.get_latest.outputs.has_new_version == 'true'
      run: |
        mkdir -p ./artifacts/${{ env.LATEST_VERSION }}/${{ matrix.arch }}
        # Copy all generated files
        [ -f mikrotik-${{ env.LATEST_VERSION }}${{ env.ARCH }}.iso ] && cp mikrotik-${{ env.LATEST_VERSION }}${{ env.ARCH }}.iso ./artifacts/${{ env.LATEST_VERSION }}/${{ matrix.arch }}/ 2>/dev/null || true
        [ -f all_packages-${{ matrix.arch }}-${{ env.LATEST_VERSION }}.zip ] && cp all_packages-${{ matrix.arch }}-${{ env.LATEST_VERSION }}.zip ./artifacts/${{ env.LATEST_VERSION }}/${{ matrix.arch }}/ 2>/dev/null || true
        [ -f routeros-${{ env.LATEST_VERSION }}${{ env.ARCH }}.npk ] && cp routeros-${{ env.LATEST_VERSION }}${{ env.ARCH }}.npk ./artifacts/${{ env.LATEST_VERSION }}/${{ matrix.arch }}/ 2>/dev/null || true
        [ -f CHANGELOG ] && cp CHANGELOG ./artifacts/${{ env.LATEST_VERSION }}/${{ matrix.arch }}/ 2>/dev/null || true

    - name: Upload artifacts
      if: steps.get_latest.outputs.has_new_version == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: mikrotik-patched-${{ env.LATEST_VERSION }}-${{ matrix.arch }}-${{ matrix.channel }}
        path: ./artifacts/${{ env.LATEST_VERSION }}/${{ matrix.arch }}/
        retention-days: 90

    - name: Create GitHub Release
      if: steps.get_latest.outputs.has_new_version == 'true' && env.RELEASE == 'true'
      uses: softprops/action-gh-release@v2
      with:
        name: "RouterOS ${{ env.LATEST_VERSION }} (${{ matrix.arch }} - ${{ matrix.channel }})"
        body_path: "CHANGELOG"
        tag_name: ${{ env.LATEST_VERSION }}-${{ matrix.arch }}-${{ matrix.channel }}
        make_latest: ${{ matrix.channel == 'stable' && matrix.arch == 'x86' }}
        prerelease: ${{ matrix.channel == 'testing' }}
        files: |
          mikrotik-${{ env.LATEST_VERSION }}${{ env.ARCH }}.iso
          all_packages-*-${{ env.LATEST_VERSION }}.zip
