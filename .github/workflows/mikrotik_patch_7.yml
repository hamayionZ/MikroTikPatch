name: Patch Mikrotik RouterOS 7.x (x86 Only)
on:
  schedule:
    - cron: "0 0 * * *"  # Daily at midnight
  workflow_dispatch:
    inputs:
      version:
        description: "Specify version (e.g., 7.19.2), empty for latest"
        required: false
        default: ''
        type: string
      release:
        description: "Release to GitHub"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

env:
  MIKRO_UPGRADE_URL: ${{ secrets.MIKRO_UPGRADE_URL || 'download.mikrotik.com' }}

jobs:
  Patch_x86_ISO:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
        
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y wget mkisofs xorriso p7zip-full rsync

    - name: Get latest RouterOS version
      id: get_version
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.version }}" ]]; then
          LATEST_VERSION="${{ github.event.inputs.version }}"
        else
          LATEST_VERSION=$(wget -q -O - https://${{ env.MIKRO_UPGRADE_URL }}/routeros/NEWESTa7.stable | cut -d ' ' -f1)
        fi
        echo "LATEST_VERSION=${LATEST_VERSION}" >> $GITHUB_ENV
        echo "version=${LATEST_VERSION}" >> $GITHUB_OUTPUT
        echo "Building RouterOS version: ${LATEST_VERSION}"

    - name: Download original ISO
      run: |
        echo "Downloading mikrotik-${{ env.LATEST_VERSION }}.iso"
        wget -nv -O mikrotik.iso https://download.mikrotik.com/routeros/${{ env.LATEST_VERSION }}/mikrotik-${{ env.LATEST_VERSION }}.iso
        
        if [ ! -f mikrotik.iso ]; then
          echo "ERROR: Failed to download ISO"
          exit 1
        fi
        echo "ISO downloaded successfully"

    - name: Extract ISO
      run: |
        mkdir -p iso new_iso
        sudo mount -o loop,ro mikrotik.iso ./iso
        sudo rsync -a ./iso/ ./new_iso/
        sudo umount ./iso
        echo "ISO extracted successfully"

    - name: Patch main RouterOS package
      run: |
        if [ -f ./new_iso/routeros-${{ env.LATEST_VERSION }}.npk ]; then
          echo "Found main package: routeros-${{ env.LATEST_VERSION }}.npk"
          cp ./new_iso/routeros-${{ env.LATEST_VERSION }}.npk ./
          python3 patch.py npk routeros-${{ env.LATEST_VERSION }}.npk
          cp -f routeros-${{ env.LATEST_VERSION }}.npk ./new_iso/
          echo "Main package patched successfully"
        else
          echo "WARNING: Main package not found in ISO"
        fi

    - name: Download and patch all packages
      run: |
        # Download all packages zip
        wget -nv -O all_packages.zip https://download.mikrotik.com/routeros/${{ env.LATEST_VERSION }}/all_packages-x86-${{ env.LATEST_VERSION }}.zip
        
        if [ -f all_packages.zip ]; then
          unzip -o all_packages.zip -d ./new_iso
          rm all_packages.zip
          echo "All packages downloaded and extracted"
        fi
        
        # Sign all NPK files
        echo "Signing all NPK packages..."
        for file in $(find ./new_iso -name "*.npk"); do
          echo "Signing: $file"
          python3 npk.py sign "$file" "$file"
        done
        
        # Create all_packages zip
        mkdir -p all_packages
        cp ./new_iso/*.npk ./all_packages/
        cd ./all_packages
        zip -r ../all_packages-x86-${{ env.LATEST_VERSION }}.zip *.npk
        cd ..
        echo "All packages signed and zipped"

    - name: Create option package (if option.sfs exists)
      run: |
        if [ -f option.sfs ]; then
          echo "Creating option package..."
          python3 npk.py create ./new_iso/gps-${{ env.LATEST_VERSION }}.npk ./new_iso/option-${{ env.LATEST_VERSION }}.npk option ./option.sfs -desc="busybox"
          echo "Option package created"
        fi

    - name: Create python3 package (if python3.sfs exists)
      run: |
        if [ -f python3.sfs ]; then
          echo "Creating python3 package..."
          python3 npk.py create ./new_iso/gps-${{ env.LATEST_VERSION }}.npk ./new_iso/python3-${{ env.LATEST_VERSION }}.npk python3 ./python3.sfs -desc="python 3.11"
          echo "Python3 package created"
        fi

    - name: Patch kernel and create final ISO
      run: |
        # Setup efiboot
        mkdir -p efiboot
        sudo mount -o loop ./new_iso/efiboot.img ./efiboot
        
        # Patch kernel
        if [ -f ./efiboot/linux.x86_64 ]; then
          echo "Patching kernel..."
          python3 patch.py kernel ./efiboot/linux.x86_64
          cp ./efiboot/linux.x86_64 ./BOOTX64.EFI
          cp ./BOOTX64.EFI ./new_iso/isolinux/linux
          echo "Kernel patched successfully"
        else
          echo "ERROR: Kernel not found"
          exit 1
        fi
        
        sudo umount ./efiboot
        
        # Create final ISO
        echo "Creating final ISO..."
        mkisofs -o mikrotik-${{ env.LATEST_VERSION }}.iso \
                -V "MikroTik ${{ env.LATEST_VERSION }} x86" \
                -b isolinux/isolinux.bin \
                -c isolinux/boot.cat \
                -no-emul-boot \
                -boot-load-size 4 \
                -boot-info-table \
                -eltorito-alt-boot \
                -e efiboot.img \
                -no-emul-boot \
                -R -J \
                ./new_iso
        
        if [ -f mikrotik-${{ env.LATEST_VERSION }}.iso ]; then
          echo "ISO created successfully: mikrotik-${{ env.LATEST_VERSION }}.iso"
          ls -lh mikrotik-${{ env.LATEST_VERSION }}.iso
        else
          echo "ERROR: Failed to create ISO"
          exit 1
        fi
        
        # Cleanup
        sudo rm -rf ./efiboot ./new_iso

    - name: Prepare artifacts
      run: |
        mkdir -p ./output
        
        # Copy ISO
        cp mikrotik-${{ env.LATEST_VERSION }}.iso ./output/
        
        # Copy all_packages zip
        cp all_packages-x86-${{ env.LATEST_VERSION }}.zip ./output/ 2>/dev/null || true
        
        # Copy main NPK
        cp routeros-${{ env.LATEST_VERSION }}.npk ./output/ 2>/dev/null || true
        
        # Copy CHANGELOG if exists
        wget -q -O CHANGELOG https://${{ env.MIKRO_UPGRADE_URL }}/routeros/${{ env.LATEST_VERSION }}/CHANGELOG 2>/dev/null || true
        [ -f CHANGELOG ] && cp CHANGELOG ./output/
        
        # Create version info
        echo "RouterOS Version: ${{ env.LATEST_VERSION }}" > ./output/version.txt
        echo "Build Time: $(date)" >> ./output/version.txt
        echo "Architecture: x86" >> ./output/version.txt
        
        echo "Artifacts prepared in ./output/"

    - name: Upload artifacts to GitHub
      uses: actions/upload-artifact@v4
      with:
        name: mikrotik-x86-${{ env.LATEST_VERSION }}
        path: ./output/
        retention-days: 90
        compression-level: 9

    - name: Create GitHub Release
      if: github.event.inputs.release == 'true' || (github.event_name == 'schedule' && env.RELEASE != 'false')
      uses: softprops/action-gh-release@v2
      with:
        name: "RouterOS ${{ env.LATEST_VERSION }} (x86)"
        body_path: "CHANGELOG"
        tag_name: "v${{ env.LATEST_VERSION }}-x86"
        make_latest: true
        files: |
          mikrotik-${{ env.LATEST_VERSION }}.iso
          all_packages-x86-${{ env.LATEST_VERSION }}.zip
          routeros-${{ env.LATEST_VERSION }}.npk

    - name: Upload to SFTP (Optional)
      if: github.event.inputs.release == 'true' && secrets.SSH_SERVER != ''
      run: |
        echo "Uploading to SFTP server..."
        # Add your SFTP upload commands here if needed

  Summary:
    needs: Patch_x86_ISO
    runs-on: ubuntu-22.04
    if: always()
    steps:
      - name: Print summary
        run: |
          echo "========================================="
          echo "Build completed for RouterOS x86"
          echo "========================================="
          echo "Artifacts saved in GitHub Actions"
          echo "Download from: Actions -> Workflow Run -> Artifacts"
          echo "========================================="
